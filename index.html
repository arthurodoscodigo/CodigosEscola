<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Simples</title>
    <style>
        body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    color:#333;
  }

  header{
    background:#0077cc;
    color:white;
    text-align:center;
    padding:30px;
  } 

  nav{
    background:#005fa3;
    text-align:center;
    padding:10px;
  }

  nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
  }

  main{
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
  }

  footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
  }

  button{
    background:#0077cc;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
  }

  button:hover{
    background:#005fa3;
  }
    </style>
</head>

<body>

    <header>
        <h1>Meu Site</h1>
        <p>Bem-vindo ao meu site!</p>
    </header>

    <nav>
        <a href="#">Início</a>
        <a href="#">Sobre</a>
        <a href="#">Contato</a>
    </nav>

    <main>
        <h2>Olá!</h2>
        <p>Este é um exemplo de site simples feito apenas com HTML, CSS e JavaScript.</p>

        <button onclick="mensagem()">Clique aqui</button>
    </main>

    <footer>
        © 2026 - Meu Site
    </footer>

    <script>
        function mensagem() {
            alert("Obrigado por visitar o site!");
        }
    </script>

</body>

</html>
